<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Java简历自动生成器 - 2026版</title>
<style>
body{max-width:700px;margin:20px auto;font-family:Arial,sans-serif;padding:20px}
label{display:block;margin:8px 0 2px;font-weight:bold}
input,textarea{width:100%;padding:8px;margin-bottom:12px;border:1px solid #ddd;border-radius:4px}
button{background:#2563eb;color:white;border:none;padding:12px 24px;border-radius:6px;cursor:pointer;font-size:16px}
pre{background:#f5f5f5;padding:12px;border-radius:4px;white-space:pre-wrap;font-size:13px}
.ad{text-align:center;margin:16px 0;color:#666}
</style>
</head>
<body>
<h2>📝 Java实习简历自动生成器</h2>
<p>填信息→一键导出专业简历</p>

<label>姓名</label><input id="name" placeholder="张三">
<label>学校</label><input id="school" placeholder="XX大学 软件工程 2026届">
<label>电话</label><input id="phone" placeholder="138xxxx">
<label>邮箱</label><input id="email" placeholder="your@email.com">
<label>项目一</label><textarea id="proj1" rows="3">Spring Boot 3 + Spring AI + Redis 构建的RAG智能知识库系统，支持文档上传、智能问答。Docker部署上线。</textarea>
<label>项目二</label><textarea id="proj2" rows="3">Spring Cloud Alibaba微服务秒杀系统，Redis Lua原子库存扣减+MQ异步削峰，QPS 5000+。</textarea>
<label>技术栈</label><input id="skills" value="Java, Spring Boot, MyBatis, MySQL, Redis, Docker, Git, Linux">
<label>Github</label><input id="github" placeholder="github.com/你的用户名">

<button onclick="generate()">生成简历 → 打印/保存PDF</button>

<div class="ad">☕ 这个工具免费。如果帮到你了，请杯咖啡👇<br><img src="qrcode.png" width="150" style="margin:8px"><br>更多免费工具：<a href="https://Abyte-zym.github.io/java-interview-quiz/">面试题库</a> | <a href="https://github.com/Abyte-zym/job-market-report">岗位分析</a></div>

<pre id="output" style="display:none"></pre>

<script>
function generate(){
document.getElementById('output').style.display='block';
document.getElementById('output').innerHTML=`
┌──────────────────────────────────────┐
│  `+document.getElementById('name').value+` │ `+document.getElementById('phone').value+` │ `+document.getElementById('email').value+`
│  GitHub: `+document.getElementById('github').value+`
└──────────────────────────────────────┘

【求职意向】Java后端开发实习生 | 可随时到岗

【教育背景】
`+document.getElementById('school').value+`

【技术栈】
`+document.getElementById('skills').value+`

【项目经历】
█ `+document.getElementById('proj1').value+`

█ `+document.getElementById('proj2').value+`

【竞赛亮点】AIGC全国三等奖 | 数学建模省一等奖

---
💡 Ctrl+P 打印 → 另存为PDF → 简历到手！
`;
}
</script>
</body>
</html>
